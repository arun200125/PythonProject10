<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Employee Wellness</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-card fade-in">
      <h2>Welcome Back 👋</h2>
      <p class="subtitle">Sign in to access your wellness dashboard</p>
      <form method="POST">
        <div class="input-group">
          <input type="email" name="email" required>
          <label>Email address</label>
        </div>
        <div class="input-group">
          <input type="password" name="password" required>
          <label>Password</label>
        </div>
        <button type="submit" class="primary-btn">Login</button>
        {% if message %}<p class="error">{{ message }}</p>{% endif %}
        <div class="links">
          <a href="{{ url_for('forgot') }}">Forgot password?</a>
          <a href="{{ url_for('register') }}">Register new employee</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
